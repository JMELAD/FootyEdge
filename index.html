<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FootyEdge — AFL Bet Analyser</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00e676">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FootyEdge">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🏉</span>
        <span class="logo-text">Footy<span class="logo-accent">Edge</span></span>
      </div>
      <div class="header-sub">AFL BET ANALYSER 2026</div>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav class="tab-nav">
    <button class="tab active" onclick="showTab('analyse')">📸 Analyse</button>
    <button class="tab" onclick="showTab('players')">🔍 Players</button>
    <button class="tab" onclick="showTab('best22')">🏆 Best 22</button>
  </nav>

  <!-- ANALYSE TAB -->
  <div id="tab-analyse" class="tab-content active">
    <div class="section-card">
      <h2 class="section-title">Upload Bet Slip</h2>
      <p class="section-sub">Take a photo of your Sportsbet or TAB slip and get a full AI breakdown</p>

      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📸</div>
        <div class="upload-text">Tap to upload bet slip photo</div>
        <div class="upload-sub">Supports JPG, PNG screenshots</div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(event)">
      </div>

      <div id="preview-area" style="display:none">
        <img id="preview-img" class="preview-img">
        <button class="btn-analyse" onclick="analyseBetSlip()">
          <span id="analyse-btn-text">🔍 Analyse Slip</span>
        </button>
      </div>
    </div>
    <div id="result-area"></div>
  </div>

  <!-- PLAYERS TAB -->
  <div id="tab-players" class="tab-content">
    <div class="section-card">
      <h2 class="section-title">Disposal Matchup</h2>
      <p class="section-sub">Select players and opposition to get disposal analysis</p>

        <option>Collingwood</option><option>Essendon</option><option>Fremantle</option>
        <option>Geelong Cats</option><option>Gold Coast Suns</option><option>GWS Giants</option>
        <option>Hawthorn</option><option>Melbourne</option><option>North Melbourne</option>
